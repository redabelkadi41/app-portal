<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Suivi Elections - Bientot disponible</title>
  <base href="/elections/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Suivi des elections en temps reel avec resultats et statistiques. Bientot disponible.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #111118;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --border: #27272a;
      --accent: #3366cc;
    }
    [data-theme="light"] {
      --bg: #f8f9fa;
      --bg-card: #ffffff;
      --text: #18181b;
      --text-muted: #71717a;
      --border: #e4e4e7;
      --accent: #002395;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      color: var(--accent);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .back:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 3v18h18M7 16l4-8 4 4 4-6"/>
    </svg>
    <h1>Suivi Elections</h1>
    <p>Cette application est en cours de developpement et sera bientot disponible.</p>
    <a href="/" class="back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour au portail
    </a>
  </div>
</body>
</html>
