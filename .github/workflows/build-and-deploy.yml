name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build

      - name: Assemble output
        run: |
          mkdir -p output

          # Portal goes to root
          cp -r dist/portal/browser/* output/

          # Each sub-app: copy build output into output/<public-path>/
          # Map build name → public folder (must match each app's <base href>)
          declare -A APP_MAP=(
            [elections]=elections
            [simulator]=simulateur-reports-voix
            [pomodoro]=pomodoro
            [palette]=palette
            [markdown]=markdown
          )
          for app in "${!APP_MAP[@]}"; do
            dest="${APP_MAP[$app]}"
            mkdir -p "output/$dest"
            cp -r "dist/$app/browser/"* "output/$dest/"
            # Flatten the double-nested prerendered route if present
            for nested in "output/$dest"/*/index.html; do
              [ -f "$nested" ] || continue
              dir="$(dirname "$nested")"
              base="$(basename "$dir")"
              # Only flatten if the nested dir matches the dest name or the app name
              if [ "$base" = "$dest" ] || [ "$base" = "$app" ]; then
                mv "$nested" "output/$dest/index.html"
                rmdir "$dir" 2>/dev/null || true
              fi
            done
          done

          # Copy PHP API files (excluding config.php with credentials)
          mkdir -p output/elections/api
          cp -r apps/elections/api/* output/elections/api/
          rm -f output/elections/api/config.php

      - name: Deploy to app-portal-static
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from ${{ github.sha }}"
          git push --force https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/redabelkadi41/app-portal-static.git HEAD:main
